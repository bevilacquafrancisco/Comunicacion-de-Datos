; =============================================================================
; platformio.ini — Dispositivo 1 (Esclavo IR)
; Trabajo Práctico N°3 — Comunicación de Datos
; =============================================================================
;
; Compilar : Ctrl+Alt+B
; Flashear : Ctrl+Alt+U
; Monitor  : Ctrl+Alt+S
;
; Si el ESP32 no entra en modo de programación automáticamente,
; mantener presionado el botón BOOT mientras aparece "Connecting..."
; y soltarlo cuando comience la transferencia.

[env:esp32dev]
platform         = espressif32
board            = esp32dev
framework        = arduino

; ── Puerto y velocidades ────────────────────────────────────────────────────
monitor_speed    = 115200
upload_speed     = 921600
; Descomentar y ajustar si PlatformIO no detecta el puerto automáticamente:
upload_port    = COM3          ; Windows
; upload_port    = /dev/ttyUSB0  ; Linux
; upload_port    = /dev/cu.usbserial-0001  ; macOS
monitor_port = COM3           ; Ajustar al puerto correcto para el monitor serial

; ── Dependencias con versiones fijadas ──────────────────────────────────────
; El operador ^ acepta parches y minors dentro del mismo major,
; garantizando compatibilidad sin quedar atado a un patch exacto.
lib_deps =
    z3t0/IRremote @ ^4.7.1

; ── Flags de compilación ────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    ; Nivel 0 = sin logs del core ESP32 en producción.
    ; Cambiar a 3 durante depuración para ver mensajes de WiFi/BT/NVS.

; ── Decodificador de excepciones ────────────────────────────────────────────
; Transforma direcciones de memoria en stack traces legibles (función + línea).
monitor_filters = esp32_exception_decoder